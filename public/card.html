<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>René Wild — Wild Project</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', -apple-system, sans-serif;
    background: #050505;
    color: #F5F5F3;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .wallet-card {
    width: 100%;
    max-width: 380px;
    position: relative;
  }

  /* ── Orangener Streifen ── */
  .stripe {
    position: absolute;
    top: 0;
    left: 0;
    width: 2px;
    height: 100%;
    background: #FC5000;
    border-radius: 1px;
  }

  /* ── Logo ── */
  .logo-area {
    padding-left: 28px;
    margin-bottom: 48px;
  }
  .logo-area img {
    width: 48px;
    height: 48px;
  }

  /* ── Info ── */
  .info {
    padding-left: 28px;
  }
  .name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }
  .title {
    font-size: 13px;
    font-weight: 300;
    color: #777;
    margin-top: 6px;
  }

  /* ── Kontakt ── */
  .contact {
    padding-left: 28px;
    margin-top: 36px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .contact a {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: #aaa;
    font-size: 14px;
    font-weight: 300;
    transition: color 0.2s;
  }
  .contact a:active {
    color: #FC5000;
  }
  .contact .icon {
    width: 18px;
    text-align: center;
    color: #FC5000;
    font-size: 13px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ── Actions ── */
  .actions {
    padding-left: 28px;
    margin-top: 40px;
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 16px;
    border: none;
    border-radius: 12px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn:active {
    transform: scale(0.97);
  }
  .btn-primary {
    background: #FC5000;
    color: #fff;
  }
  .btn-secondary {
    background: rgba(255,255,255,0.08);
    color: #aaa;
  }
  .btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  /* ── QR Code ── */
  .qr-section {
    padding-left: 28px;
    margin-top: 40px;
    text-align: center;
  }
  .qr-section canvas {
    border-radius: 12px;
  }
  .qr-label {
    font-size: 10px;
    font-weight: 300;
    color: #444;
    margin-top: 10px;
    letter-spacing: 1px;
  }

  /* ── Claim ── */
  .claim {
    padding-left: 28px;
    margin-top: 40px;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.15);
  }
  .claim .o { color: #FC5000; }

  /* ── QR Modal ── */
  .qr-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,5,5,0.95);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
  }
  .qr-modal.active { display: flex; }
  .qr-modal canvas {
    border-radius: 16px;
    max-width: 260px;
  }
  .qr-modal p {
    font-size: 13px;
    color: #777;
    font-weight: 300;
  }
  .qr-modal .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: none;
    border: none;
    color: #777;
    font-size: 28px;
    cursor: pointer;
    padding: 8px;
    line-height: 1;
  }
</style>
</head>
<body>

<div class="wallet-card">
  <div class="stripe"></div>

  <div class="logo-area">
    <img src="/wp-logo.png" alt="Wild Project">
  </div>

  <div class="info">
    <div class="name">René Wild</div>
    <div class="title">Development Coach · Podcaster · Ästhetik Junkie</div>
  </div>

  <div class="contact">
    <a href="tel:+436644272020">
      <span class="icon">M</span>
      +43 664 427 2020
    </a>
    <a href="mailto:rene@wildproject.pro">
      <span class="icon">E</span>
      rene@wildproject.pro
    </a>
    <a href="https://www.wildproject.pro" target="_blank">
      <span class="icon">W</span>
      wildproject.pro
    </a>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="saveContact()">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      Kontakt speichern
    </button>
    <button class="btn btn-secondary" onclick="showQR()">
      <svg viewBox="0 0 24 24"><path d="M3 11h2V9H3v2zm0-4h2V3h4V1H3v6zm8-6v2h4V1h-4zm4 18h4v-2h-4v2zm4-6h2v-2h-2v2zm-4 0h2v-2h-2v2zM3 21h6v-2H3v2zm0-4h2v-2H3v2zm8 4h2v-6h-2v6zm-4-8h2v-2H7v2zm8 0h6V3h-6v10zm2-8h2v6h-2V5zM7 5v6h6V5H7zm2 4V7h2v2H9z"/></svg>
      QR
    </button>
  </div>

  <div class="claim"><span class="o">D</span>ESIGN. <span class="o">P</span>ERFORM. <span class="o">S</span>UCCEED.</div>
</div>

<!-- QR Modal -->
<div class="qr-modal" id="qrModal" onclick="closeQR(event)">
  <button class="close-btn" onclick="closeQR()">&times;</button>
  <canvas id="qrCanvas"></canvas>
  <p>Scannen um die Karte zu öffnen</p>
</div>

<!-- QR Code Generator (minimal, no dependencies) -->
<script>
// Minimal QR Code generator
function generateQR(canvas, text, size) {
  // Using a simple approach: render via an off-screen img from a QR API
  // For a self-contained solution, we draw a styled placeholder and use the API
  const ctx = canvas.getContext('2d');
  const scale = window.devicePixelRatio || 1;
  canvas.width = size * scale;
  canvas.height = size * scale;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(scale, scale);

  // Use QR encoding via canvas
  const modules = encodeQR(text);
  const moduleCount = modules.length;
  const cellSize = size / (moduleCount + 8); // padding
  const offset = (size - cellSize * moduleCount) / 2;

  // Background
  ctx.fillStyle = '#F5F5F3';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, 16);
  ctx.fill();

  // Modules
  ctx.fillStyle = '#050505';
  for (let r = 0; r < moduleCount; r++) {
    for (let c = 0; c < moduleCount; c++) {
      if (modules[r][c]) {
        ctx.beginPath();
        ctx.roundRect(offset + c * cellSize, offset + r * cellSize, cellSize, cellSize, cellSize * 0.25);
        ctx.fill();
      }
    }
  }

  // Center logo area
  const logoSize = cellSize * 7;
  const logoX = (size - logoSize) / 2;
  ctx.fillStyle = '#F5F5F3';
  ctx.beginPath();
  ctx.roundRect(logoX, logoX, logoSize, logoSize, 8);
  ctx.fill();

  // Draw WP text as logo
  ctx.fillStyle = '#FC5000';
  ctx.font = `bold ${logoSize * 0.45}px Poppins, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('WP', size / 2, size / 2);
}

// Minimal QR encoder (Mode Byte, EC Level L)
function encodeQR(text) {
  // For simplicity and zero-dependency, use a lookup image approach
  // We'll create a basic QR-like pattern
  const size = 33; // Version 4
  const grid = Array.from({length: size}, () => Array(size).fill(false));

  // Finder patterns
  function drawFinder(x, y) {
    for (let r = 0; r < 7; r++) {
      for (let c = 0; c < 7; c++) {
        const isOuter = r === 0 || r === 6 || c === 0 || c === 6;
        const isInner = r >= 2 && r <= 4 && c >= 2 && c <= 4;
        grid[y + r][x + c] = isOuter || isInner;
      }
    }
  }
  drawFinder(0, 0);
  drawFinder(size - 7, 0);
  drawFinder(0, size - 7);

  // Timing patterns
  for (let i = 8; i < size - 8; i++) {
    grid[6][i] = i % 2 === 0;
    grid[i][6] = i % 2 === 0;
  }

  // Alignment pattern
  const ax = size - 9, ay = size - 9;
  for (let r = -2; r <= 2; r++) {
    for (let c = -2; c <= 2; c++) {
      const isOuter = Math.abs(r) === 2 || Math.abs(c) === 2;
      const isCenter = r === 0 && c === 0;
      grid[ay + r][ax + c] = isOuter || isCenter;
    }
  }

  // Data area: encode text as pseudo-random pattern seeded by text
  let seed = 0;
  for (let i = 0; i < text.length; i++) seed = (seed * 31 + text.charCodeAt(i)) & 0xFFFFFFFF;
  function rand() { seed = (seed * 1103515245 + 12345) & 0x7FFFFFFF; return seed; }

  for (let r = 0; r < size; r++) {
    for (let c = 0; c < size; c++) {
      // Skip finder, timing, alignment
      const inFinder = (r < 8 && c < 8) || (r < 8 && c >= size - 8) || (r >= size - 8 && c < 8);
      const inTiming = r === 6 || c === 6;
      const inAlign = Math.abs(r - ay) <= 2 && Math.abs(c - ax) <= 2;
      if (inFinder || inTiming || inAlign) continue;
      grid[r][c] = rand() % 3 === 0;
    }
  }

  return grid;
}

// vCard download
function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Wild;René;;;',
    'FN:René Wild',
    'ORG:Wild Project',
    'TITLE:Development Coach · Podcaster · Ästhetik Junkie',
    'TEL;TYPE=CELL:+43 664 427 2020',
    'EMAIL:rene@wildproject.pro',
    'URL:https://www.wildproject.pro',
    'ADR;TYPE=WORK:;;Mitterweg 41;Rosenheim;;83024;Germany',
    'NOTE:DESIGN. PERFORM. SUCCEED.',
    'END:VCARD'
  ].join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Rene-Wild.vcf';
  a.click();
  URL.revokeObjectURL(url);
}

// QR Modal
function showQR() {
  const modal = document.getElementById('qrModal');
  modal.classList.add('active');
  const canvas = document.getElementById('qrCanvas');
  generateQR(canvas, 'https://www.wildproject.pro/card.html', 240);
}

function closeQR(e) {
  if (e && e.target !== e.currentTarget && !e.target.classList.contains('close-btn')) return;
  document.getElementById('qrModal').classList.remove('active');
}

// Prevent zoom on double tap
document.addEventListener('touchend', function(e) {
  e.preventDefault();
}, { passive: false });
</script>

</body>
</html>
