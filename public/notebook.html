<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes — Wild Project</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;500;600;700&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Caveat:wght@400;500&family=IBM+Plex+Mono:wght@300;400&display=swap');

  :root {
    --bg: #050505;
    --bg-sidebar: #0A0A0A;
    --bg-editor: #050505;
    --text: #F5F5F3;
    --text-dim: rgba(255,255,255,0.35);
    --text-dimmer: rgba(255,255,255,0.15);
    --border: rgba(255,255,255,0.04);
    --border-hover: rgba(255,255,255,0.08);
    --accent: #FC5000;
    --accent-dim: rgba(252,80,0,0.08);
    --accent-glow: rgba(252,80,0,0.04);
    --silver: #E4E4E4;
    --hover-bg: rgba(255,255,255,0.03);
    --toolbar-hover: rgba(255,255,255,0.04);
  }

  .light {
    --bg: #F5F5F3;
    --bg-sidebar: #EAEAE8;
    --bg-editor: #F5F5F3;
    --text: #1A1A1A;
    --text-dim: rgba(0,0,0,0.4);
    --text-dimmer: rgba(0,0,0,0.15);
    --border: rgba(0,0,0,0.06);
    --border-hover: rgba(0,0,0,0.1);
    --accent: #FC5000;
    --accent-dim: rgba(252,80,0,0.08);
    --accent-glow: rgba(252,80,0,0.03);
    --hover-bg: rgba(0,0,0,0.03);
    --toolbar-hover: rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -20%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: relative;
    z-index: 100;
    flex-shrink: 0;
    transition: background 0.3s, border-color 0.3s;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-link {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }

  .brand-logo {
    height: 32px;
    width: auto;
    opacity: 0.7;
    transition: all 0.3s;
  }

  .brand-link:hover .brand-logo {
    opacity: 1;
    filter: drop-shadow(0 0 8px rgba(252,80,0,0.4));
  }

  .brand-label {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .header-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: monospace;
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 2px;
    color: var(--text-dim);
    transition: all 0.3s;
    padding: 4px 0;
    text-transform: uppercase;
    text-decoration: none;
  }

  .header-btn:hover { color: var(--accent); }

  /* ── Main Layout ── */
  .app-main {
    display: flex;
    flex: 1;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 280px;
    flex-shrink: 0;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: background 0.3s, border-color 0.3s;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px 16px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .sidebar-label {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .sidebar-actions {
    display: flex;
    gap: 8px;
  }

  .icon-btn {
    width: 28px;
    height: 28px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text-dim);
  }

  .icon-btn:hover {
    background: var(--toolbar-hover);
    color: var(--accent);
  }

  .icon-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .search-wrap {
    padding: 0 12px 12px;
    flex-shrink: 0;
  }

  .search-input {
    width: 100%;
    border: 1px solid var(--border);
    background: transparent;
    border-radius: 6px;
    padding: 7px 10px 7px 30px;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder {
    color: var(--text-dimmer);
  }

  .search-input:focus {
    border-color: rgba(252,80,0,0.3);
  }

  .search-wrap {
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-calc(50% + 6px));
    top: 9px;
    width: 14px;
    height: 14px;
    stroke: var(--text-dimmer);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    pointer-events: none;
  }

  .notes-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px 12px;
  }

  .notes-list::-webkit-scrollbar { width: 4px; }
  .notes-list::-webkit-scrollbar-track { background: transparent; }
  .notes-list::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

  .note-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    margin-bottom: 2px;
  }

  .note-item:hover {
    background: var(--hover-bg);
  }

  .note-item.active {
    background: var(--accent-dim);
    border-left-color: var(--accent);
  }

  .note-item-title {
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
    line-height: 1.3;
  }

  .note-item-date {
    font-family: monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    color: var(--text-dimmer);
    text-transform: uppercase;
    margin-bottom: 3px;
  }

  .note-item-preview {
    font-family: 'Poppins', sans-serif;
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }

  .no-notes {
    padding: 24px 16px;
    text-align: center;
    color: var(--text-dimmer);
    font-size: 12px;
  }

  /* ── Editor Area ── */
  .editor-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: background 0.3s;
    background: var(--bg-editor);
  }

  .editor-toolbar {
    display: flex;
    align-items: center;
    padding: 8px 16px;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
    transition: border-color 0.3s;
  }

  .tool-btn {
    width: 34px;
    height: 34px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    color: var(--text-dim);
  }

  .tool-btn:hover {
    background: var(--toolbar-hover);
  }

  .tool-btn.active {
    background: var(--accent-dim);
    color: var(--accent);
  }

  .tool-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .tool-btn .tool-letter {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: currentColor;
    line-height: 1;
  }

  .tool-sep {
    width: 1px;
    height: 16px;
    background: var(--border);
    margin: 0 6px;
    flex-shrink: 0;
  }

  .font-select {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 1px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    outline: none;
    margin-left: 6px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    appearance: none;
  }

  .font-select:focus { border-color: rgba(252,80,0,0.3); }
  .font-select option { background: #151515; color: #F5F5F3; }

  .toolbar-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .delete-btn {
    width: 34px;
    height: 34px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    color: var(--text-dimmer);
  }

  .delete-btn:hover {
    background: rgba(220,38,38,0.08);
    color: #DC2626;
  }

  .delete-btn svg {
    width: 16px;
    height: 16px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ── Editor Content ── */
  .editor-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px 60px;
  }

  .editor-scroll::-webkit-scrollbar { width: 4px; }
  .editor-scroll::-webkit-scrollbar-track { background: transparent; }
  .editor-scroll::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }

  .editor-content {
    outline: none;
    min-height: 200px;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    caret-color: var(--accent);
    max-width: 720px;
  }

  .editor-content:empty::before {
    content: 'Neue Notiz...';
    color: var(--text-dimmer);
    pointer-events: none;
  }

  .editor-content h1 {
    font-family: 'Poppins', sans-serif;
    font-size: 28px;
    font-weight: 600;
    margin: 0 0 8px;
    line-height: 1.3;
    color: var(--text);
  }

  .editor-content h2 {
    font-family: 'Poppins', sans-serif;
    font-size: 20px;
    font-weight: 500;
    margin: 16px 0 6px;
    line-height: 1.3;
    color: var(--text);
  }

  .editor-content ul, .editor-content ol {
    padding-left: 20px;
    margin: 6px 0;
  }

  .editor-content li { margin: 3px 0; }

  .editor-content hr {
    border: none;
    border-top: 1px solid var(--border-hover);
    margin: 20px 0;
  }

  /* Checklist */
  .checklist-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 4px 0;
    line-height: 1.6;
    position: relative;
  }

  .checklist-box {
    width: 18px;
    height: 18px;
    min-width: 18px;
    border: 1.5px solid var(--text-dim);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    margin-top: 3px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    background: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  .checklist-box:hover {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .checklist-box.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checklist-box.checked:hover {
    background: #e04800;
    border-color: #e04800;
  }

  .checklist-box::after {
    content: '';
    width: 8px;
    height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .checklist-box.checked::after {
    opacity: 1;
  }

  .checklist-text {
    flex: 1;
    outline: none;
    min-width: 20px;
    word-break: break-word;
  }

  .checklist-item.done .checklist-text {
    text-decoration: line-through;
    opacity: 0.35;
  }

  /* Empty state */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dimmer);
    gap: 12px;
  }

  .empty-state svg {
    width: 48px;
    height: 48px;
    stroke: var(--text-dimmer);
    fill: none;
    stroke-width: 1;
    opacity: 0.5;
  }

  .empty-state-text {
    font-family: monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* ── Mobile ── */
  .mobile-back {
    display: none;
  }

  @media (max-width: 680px) {
    .sidebar {
      width: 100%;
      position: absolute;
      inset: 0;
      z-index: 50;
      transition: transform 0.25s ease;
    }

    .sidebar.hidden {
      transform: translateX(-100%);
    }

    .editor-area {
      position: absolute;
      inset: 0;
      z-index: 40;
    }

    .mobile-back {
      display: flex;
      align-items: center;
      gap: 6px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-family: monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--accent);
      padding: 0;
      text-transform: uppercase;
      margin-right: 8px;
    }

    .mobile-back svg {
      width: 14px;
      height: 14px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .editor-scroll {
      padding: 20px 20px 40px;
    }

    .app-main {
      position: relative;
    }
  }

  /* ── Selection ── */
  ::selection {
    background: rgba(252,80,0,0.2);
  }
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="app-header">
  <div class="header-left">
    <a href="https://www.wildproject.pro/" class="brand-link">
      <img src="/wp-logo.png" alt="WP" class="brand-logo">
      <span class="brand-label">NOTES</span>
    </a>
  </div>
  <div class="header-right">
    <button class="header-btn" id="themeToggle" onclick="toggleTheme()">DARK</button>
    <a href="https://www.wildproject.pro/workspace.html" class="header-btn">X</a>
  </div>
</header>

<!-- ── Main ── -->
<main class="app-main">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">NOTIZEN</span>
      <div class="sidebar-actions">
        <button class="icon-btn" onclick="createNote()" title="Neue Notiz">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Suchen..." oninput="renderNotesList()">
    </div>
    <div class="notes-list" id="notesList"></div>
  </aside>

  <!-- Editor -->
  <section class="editor-area" id="editorArea">
    <div class="editor-toolbar" id="editorToolbar" style="display:none;">
      <button class="mobile-back" id="mobileBack" onclick="showSidebar()">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        LISTE
      </button>
      <button class="tool-btn" onclick="execFormat('bold')" title="Fett">
        <span class="tool-letter" style="font-weight:700;">B</span>
      </button>
      <button class="tool-btn" onclick="execFormat('italic')" title="Kursiv">
        <span class="tool-letter" style="font-style:italic;">I</span>
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="execFormat('h1')" title="Heading 1">
        <span class="tool-letter" style="font-size:11px;">H1</span>
      </button>
      <button class="tool-btn" onclick="execFormat('h2')" title="Heading 2">
        <span class="tool-letter" style="font-size:11px;">H2</span>
      </button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="execFormat('ul')" title="Liste">
        <svg viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="5" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="5" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="5" cy="18" r="1" fill="currentColor" stroke="none"/></svg>
      </button>
      <button class="tool-btn" onclick="execFormat('checklist')" title="Checkliste">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><polyline points="5 7 6.5 9 10 4" stroke-width="1.5"/><rect x="3" y="14" width="7" height="7" rx="1"/><line x1="14" y1="6" x2="21" y2="6"/><line x1="14" y1="17.5" x2="21" y2="17.5"/></svg>
      </button>
      <button class="tool-btn" onclick="execFormat('hr')" title="Trennlinie">
        <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/></svg>
      </button>
      <div class="tool-sep"></div>
      <select class="font-select" id="fontSelect" onchange="changeFont()">
        <option value="Poppins" style="font-family:'Poppins'">Poppins</option>
        <option value="JetBrains Mono" style="font-family:'JetBrains Mono'">JetBrains Mono</option>
        <option value="IBM Plex Mono" style="font-family:'IBM Plex Mono'">IBM Plex Mono</option>
        <option value="ui-monospace, monospace" style="font-family:monospace">System Mono</option>
        <option value="Caveat" style="font-family:'Caveat'">Caveat</option>
      </select>
      <div class="toolbar-right">
        <button class="delete-btn" onclick="deleteNote()" title="Notiz entfernen">
          <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
        </button>
      </div>
    </div>
    <div class="editor-scroll" id="editorScroll" style="display:none;">
      <div class="editor-content" id="editorContent" contenteditable="true"></div>
    </div>
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span class="empty-state-text">Notiz auswaehlen oder erstellen</span>
    </div>
  </section>

</main>

<script>
(function() {
  'use strict';

  const STORAGE_KEY = 'wp_notes';
  const THEME_KEY = 'wp_theme';
  let notes = [];
  let activeId = null;
  let saveTimer = null;

  // ── Init ──
  function init() {
    loadTheme();
    loadNotes();
    if (notes.length === 0) {
      createDefaultNote();
    }
    renderNotesList();
    // Select first note
    if (notes.length > 0) {
      selectNote(notes[0].id);
    }
    setupEditorEvents();
  }

  function createDefaultNote() {
    const now = new Date().toISOString();
    const defaultNote = {
      id: generateId(),
      title: 'Willkommen',
      content: '<h1>Willkommen bei WP Notes</h1><p>Dein persoenlicher Notizblock im Wild Project Workspace.</p><h2>Formatierung</h2><p>Du kannst <b>fetten Text</b> und <i>kursiven Text</i> verwenden.</p><ul><li>Aufzaehlungen erstellen</li><li>Ideen festhalten</li><li>Gedanken ordnen</li></ul><h2>Checkliste</h2><div class="checklist-item"><span class="checklist-box"></span><span class="checklist-text">Neue Idee notieren</span></div><div class="checklist-item done"><span class="checklist-box checked"></span><span class="checklist-text">Wild Project Workspace einrichten</span></div><div class="checklist-item"><span class="checklist-box"></span><span class="checklist-text">Notizen synchronisieren</span></div><hr><p>Waehle eine Schriftart aus der Toolbar oder erstelle eine neue Notiz mit dem + Button.</p>',
      created: now,
      updated: now,
      font: 'Poppins'
    };
    notes.push(defaultNote);
    saveNotes();
  }

  function generateId() {
    return 'n_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
  }

  // ── Persistence ──
  function loadNotes() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) notes = JSON.parse(raw);
    } catch(e) { notes = []; }
  }

  function saveNotes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  }

  // ── Theme ──
  function loadTheme() {
    const saved = localStorage.getItem(THEME_KEY) || 'dark';
    applyTheme(saved);
  }

  function applyTheme(theme) {
    if (theme === 'light') {
      document.body.classList.add('light');
    } else {
      document.body.classList.remove('light');
    }
    document.getElementById('themeToggle').textContent = theme === 'light' ? 'LIGHT' : 'DARK';
    localStorage.setItem(THEME_KEY, theme);
  }

  window.toggleTheme = function() {
    const current = localStorage.getItem(THEME_KEY) || 'dark';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  };

  // ── Notes List ──
  window.renderNotesList = function() {
    const container = document.getElementById('notesList');
    const query = document.getElementById('searchInput').value.toLowerCase().trim();

    let filtered = notes;
    if (query) {
      filtered = notes.filter(n => {
        const plainContent = stripHtml(n.content).toLowerCase();
        return n.title.toLowerCase().includes(query) || plainContent.includes(query);
      });
    }

    // Sort by updated desc
    filtered.sort((a, b) => new Date(b.updated) - new Date(a.updated));

    if (filtered.length === 0) {
      container.innerHTML = '<div class="no-notes">' + (query ? 'Keine Ergebnisse' : 'Keine Notizen') + '</div>';
      return;
    }

    container.innerHTML = filtered.map(n => {
      const isActive = n.id === activeId;
      const date = formatDate(n.updated);
      const preview = stripHtml(n.content).substring(0, 80);
      return '<div class="note-item' + (isActive ? ' active' : '') + '" data-id="' + n.id + '" onclick="selectNote(\'' + n.id + '\')">' +
        '<div class="note-item-title">' + escHtml(n.title || 'Ohne Titel') + '</div>' +
        '<div class="note-item-date">' + date + '</div>' +
        '<div class="note-item-preview">' + escHtml(preview) + '</div>' +
      '</div>';
    }).join('');
  };

  function stripHtml(html) {
    const tmp = document.createElement('div');
    tmp.innerHTML = html || '';
    return tmp.textContent || tmp.innerText || '';
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function formatDate(iso) {
    const d = new Date(iso);
    const day = String(d.getDate()).padStart(2, '0');
    const mon = String(d.getMonth() + 1).padStart(2, '0');
    const year = d.getFullYear();
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    return day + '.' + mon + '.' + year + '  ' + h + ':' + m;
  }

  // ── Select Note ──
  window.selectNote = function(id) {
    // Save current note first
    if (activeId) saveCurrentNote();

    activeId = id;
    const note = notes.find(n => n.id === id);
    if (!note) return;

    const editor = document.getElementById('editorContent');
    const toolbar = document.getElementById('editorToolbar');
    const scroll = document.getElementById('editorScroll');
    const empty = document.getElementById('emptyState');

    toolbar.style.display = 'flex';
    scroll.style.display = 'block';
    empty.style.display = 'none';

    editor.innerHTML = note.content || '';
    editor.style.fontFamily = note.font || "'Poppins', sans-serif";

    // Set font selector
    const fontSelect = document.getElementById('fontSelect');
    const fontVal = note.font || 'Poppins';
    for (let i = 0; i < fontSelect.options.length; i++) {
      if (fontSelect.options[i].value === fontVal) {
        fontSelect.selectedIndex = i;
        break;
      }
    }

    renderNotesList();

    // Mobile: hide sidebar
    if (window.innerWidth <= 680) {
      document.getElementById('sidebar').classList.add('hidden');
    }
  };

  // ── Create Note ──
  window.createNote = function() {
    const now = new Date().toISOString();
    const note = {
      id: generateId(),
      title: 'Neue Notiz',
      content: '',
      created: now,
      updated: now,
      font: 'Poppins'
    };
    notes.unshift(note);
    saveNotes();
    selectNote(note.id);
    // Focus editor
    setTimeout(function() {
      document.getElementById('editorContent').focus();
    }, 50);
  };

  // ── Delete Note ──
  window.deleteNote = function() {
    if (!activeId) return;
    const idx = notes.findIndex(n => n.id === activeId);
    if (idx === -1) return;

    notes.splice(idx, 1);
    activeId = null;
    saveNotes();

    document.getElementById('editorToolbar').style.display = 'none';
    document.getElementById('editorScroll').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';

    renderNotesList();

    // Select next note if available
    if (notes.length > 0) {
      selectNote(notes[0].id);
    }
  };

  // ── Save Current Note ──
  function saveCurrentNote() {
    if (!activeId) return;
    const note = notes.find(n => n.id === activeId);
    if (!note) return;

    const editor = document.getElementById('editorContent');
    note.content = editor.innerHTML;
    note.updated = new Date().toISOString();

    // Extract title from first heading or first line
    const titleEl = editor.querySelector('h1, h2');
    if (titleEl && titleEl.textContent.trim()) {
      note.title = titleEl.textContent.trim().substring(0, 100);
    } else {
      const plain = stripHtml(editor.innerHTML).trim();
      note.title = plain.substring(0, 60) || 'Ohne Titel';
    }

    saveNotes();
  }

  function debouncedSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function() {
      saveCurrentNote();
      renderNotesList();
    }, 400);
  }

  // ── Editor Events ──
  function setupEditorEvents() {
    const editor = document.getElementById('editorContent');
    editor.addEventListener('input', debouncedSave);
    editor.addEventListener('keydown', function(e) {
      // Tab support
      if (e.key === 'Tab') {
        e.preventDefault();
        document.execCommand('insertText', false, '    ');
        return;
      }

      // Checklist keyboard handling
      const sel = window.getSelection();
      if (!sel.rangeCount) return;
      const node = sel.anchorNode;
      const checkItem = node && (node.nodeType === 3 ? node.parentElement : node).closest('.checklist-item');

      if (checkItem) {
        const textEl = checkItem.querySelector('.checklist-text');

        // Enter → new checklist item
        if (e.key === 'Enter') {
          e.preventDefault();
          e.stopPropagation();
          const newItem = document.createElement('div');
          newItem.className = 'checklist-item';
          newItem.innerHTML = '<span class="checklist-box"></span><span class="checklist-text"><br></span>';
          checkItem.after(newItem);
          // Place cursor in new item
          const newText = newItem.querySelector('.checklist-text');
          const range = document.createRange();
          range.setStart(newText, 0);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
          debouncedSave();
          return;
        }

        // Backspace on empty item → remove it
        if (e.key === 'Backspace' && textEl) {
          const text = textEl.textContent.trim();
          if (text === '') {
            e.preventDefault();
            e.stopPropagation();
            const prevItem = checkItem.previousElementSibling;
            const nextItem = checkItem.nextElementSibling;
            checkItem.remove();
            // Move cursor to previous item or next
            const target = prevItem && prevItem.classList.contains('checklist-item')
              ? prevItem.querySelector('.checklist-text')
              : nextItem && nextItem.classList.contains('checklist-item')
                ? nextItem.querySelector('.checklist-text')
                : null;
            if (target) {
              const range = document.createRange();
              range.selectNodeContents(target);
              range.collapse(false); // end
              sel.removeAllRanges();
              sel.addRange(range);
            }
            debouncedSave();
            return;
          }
        }
      }
    });

    // Handle clicks on checklist boxes via delegation
    editor.addEventListener('click', function(e) {
      if (e.target.classList.contains('checklist-box')) {
        e.preventDefault();
        e.stopPropagation();
        toggleCheck(e.target);
      }
    });

    // Prevent checklist-box from stealing focus
    editor.addEventListener('mousedown', function(e) {
      if (e.target.classList.contains('checklist-box')) {
        e.preventDefault();
      }
    });
  }

  // ── Formatting ──
  window.execFormat = function(cmd) {
    const editor = document.getElementById('editorContent');
    editor.focus();

    switch(cmd) {
      case 'bold':
        document.execCommand('bold');
        break;
      case 'italic':
        document.execCommand('italic');
        break;
      case 'h1':
        document.execCommand('formatBlock', false, '<h1>');
        break;
      case 'h2':
        document.execCommand('formatBlock', false, '<h2>');
        break;
      case 'ul':
        document.execCommand('insertUnorderedList');
        break;
      case 'hr':
        document.execCommand('insertHTML', false, '<hr><p><br></p>');
        break;
      case 'checklist':
        insertChecklist();
        break;
    }
    debouncedSave();
  };

  function insertChecklist() {
    const html = '<div class="checklist-item"><span class="checklist-box"></span><span class="checklist-text">Aufgabe</span></div><p><br></p>';
    document.execCommand('insertHTML', false, html);
    // Select the text "Aufgabe" so user can type over it
    setTimeout(function() {
      const editor = document.getElementById('editorContent');
      const items = editor.querySelectorAll('.checklist-text');
      if (items.length > 0) {
        const last = items[items.length - 1];
        if (last.textContent === 'Aufgabe') {
          const range = document.createRange();
          range.selectNodeContents(last);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }
      }
    }, 10);
  }

  window.toggleCheck = function(box) {
    const item = box.closest('.checklist-item');
    if (!item) return;
    const isDone = box.classList.contains('checked');
    if (isDone) {
      box.classList.remove('checked');
      item.classList.remove('done');
    } else {
      box.classList.add('checked');
      item.classList.add('done');
    }
    debouncedSave();
  };

  // ── Font ──
  window.changeFont = function() {
    const fontSelect = document.getElementById('fontSelect');
    const font = fontSelect.value;
    const editor = document.getElementById('editorContent');
    editor.style.fontFamily = "'" + font + "', sans-serif";

    if (activeId) {
      const note = notes.find(n => n.id === activeId);
      if (note) {
        note.font = font;
        saveNotes();
      }
    }
  };

  // ── Mobile ──
  window.showSidebar = function() {
    document.getElementById('sidebar').classList.remove('hidden');
  };

  // ── Start ──
  init();

})();
</script>
</body>
