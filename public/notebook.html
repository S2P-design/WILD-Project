<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notebook — Wild Project</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', -apple-system, sans-serif;
    background: #050505;
    color: #F5F5F3;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Ambient glow ── */
  body::before {
    content: '';
    position: fixed;
    top: -30%; left: -20%;
    width: 70%; height: 70%;
    background: radial-gradient(ellipse, rgba(252,80,0,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Header ── */
  .nb-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    max-width: 860px;
    margin-bottom: 16px;
    position: relative;
    z-index: 10;
  }
  .nb-brand {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }
  .nb-logo {
    height: 32px;
    width: auto;
    opacity: 0.7;
    transition: all 0.3s;
  }
  .nb-brand:hover .nb-logo {
    opacity: 1;
    filter: drop-shadow(0 0 8px rgba(252,80,0,0.4));
  }
  .nb-title {
    font-family: monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  .nb-controls {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .nb-btn {
    border: none;
    background: transparent;
    cursor: pointer;
    font-family: monospace;
    font-size: 8px;
    font-weight: 400;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.35);
    transition: all 0.3s;
    padding: 4px 0;
    text-transform: uppercase;
  }
  .nb-btn:hover { color: #FC5000; }

  /* ── Notebook ── */
  .notebook-scene {
    perspective: 1800px;
    width: 100%;
    max-width: 860px;
    position: relative;
    z-index: 1;
  }

  .notebook-book {
    position: relative;
    width: 100%;
    aspect-ratio: 210 / 148;
    transform-style: preserve-3d;
  }

  /* ── Page ── */
  .nb-page {
    position: absolute;
    inset: 0;
    background: #0C0C0C;
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 4px;
    overflow: hidden;
    transform-origin: left center;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
    backface-visibility: hidden;
    box-shadow: 0 1px 8px rgba(0,0,0,0.3);
  }
  .nb-page.flipped {
    transform: rotateY(-180deg);
    pointer-events: none;
  }
  .nb-page.behind {
    opacity: 0;
    pointer-events: none;
  }

  /* Stack effect — pages underneath slightly visible */
  .nb-page::after {
    content: '';
    position: absolute;
    right: 0; top: 2px; bottom: 2px;
    width: 3px;
    background: linear-gradient(180deg,
      transparent,
      rgba(255,255,255,0.02) 20%,
      rgba(255,255,255,0.02) 80%,
      transparent
    );
    z-index: 5;
  }

  /* ── Spine ── */
  .nb-spine {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: linear-gradient(180deg,
      transparent 0%,
      rgba(252,80,0,0.2) 15%,
      rgba(252,80,0,0.2) 85%,
      transparent 100%
    );
    z-index: 10;
    pointer-events: none;
  }

  /* ── Dot Grid ── */
  .dot-grid {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.06) 0.8px, transparent 0.8px);
    background-size: 22px 22px;
    background-position: 18px 18px;
    pointer-events: none;
    z-index: 1;
  }

  /* ── Canvas ── */
  .draw-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    cursor: crosshair;
    touch-action: none;
  }

  /* ── Page number ── */
  .page-num {
    position: absolute;
    bottom: 12px;
    right: 16px;
    font-family: monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.1);
    z-index: 3;
    pointer-events: none;
  }

  /* ── Navigation arrows (on page) ── */
  .page-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 20;
    width: 40px;
    height: 60px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .notebook-book:hover .page-nav { opacity: 1; }
  .page-nav svg {
    width: 20px;
    height: 20px;
    stroke: rgba(255,255,255,0.15);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
    transition: stroke 0.2s;
  }
  .page-nav:hover svg { stroke: #FC5000; }
  .page-nav-prev { left: 8px; }
  .page-nav-next { right: 8px; }

  /* ── Toolbar ── */
  .nb-toolbar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
    margin-top: 16px;
    position: relative;
    z-index: 10;
  }

  .tool-btn {
    width: 32px;
    height: 32px;
    border: none;
    background: transparent;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .tool-btn:hover { background: rgba(255,255,255,0.04); }
  .tool-btn.active { background: rgba(252,80,0,0.08); }
  .tool-btn svg {
    width: 14px;
    height: 14px;
    stroke: rgba(255,255,255,0.3);
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .tool-btn.active svg { stroke: #FC5000; }
  .tool-btn:hover svg { stroke: rgba(255,255,255,0.5); }
  .tool-btn.active:hover svg { stroke: #FC5000; }

  .tool-sep {
    width: 1px;
    height: 16px;
    background: rgba(255,255,255,0.05);
    margin: 0 6px;
  }

  .color-swatch {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.06);
    cursor: pointer;
    transition: all 0.2s;
    margin: 0 1px;
  }
  .color-swatch:hover { transform: scale(1.2); }
  .color-swatch.active {
    border-color: #FC5000;
    box-shadow: 0 0 6px rgba(252,80,0,0.3);
  }

  /* ── Page dots ── */
  .nb-dots {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 14px;
    z-index: 10;
  }
  .nb-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    cursor: pointer;
    transition: all 0.25s;
    border: none;
    padding: 0;
  }
  .nb-dot.active {
    background: #FC5000;
    box-shadow: 0 0 6px rgba(252,80,0,0.3);
  }
  .nb-dot:hover { background: rgba(255,255,255,0.2); }

  /* ── Close ── */
  .close-btn {
    position: fixed;
    top: 20px;
    right: 20px;
    z-index: 100;
    width: 36px;
    height: 36px;
    border: none;
    background: rgba(255,255,255,0.04);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .close-btn::before,
  .close-btn::after {
    content: '';
    position: absolute;
    width: 14px;
    height: 1px;
    background: rgba(255,255,255,0.25);
    transition: all 0.2s;
  }
  .close-btn::before { transform: rotate(45deg); }
  .close-btn::after { transform: rotate(-45deg); }
  .close-btn:hover { background: rgba(252,80,0,0.08); }
  .close-btn:hover::before,
  .close-btn:hover::after { background: #FC5000; }

  /* ══════════════════════════════ */
  /* ── Light Mode                 */
  /* ══════════════════════════════ */
  body.light {
    background: #F5F5F3;
    color: #1a1a1a;
  }
  body.light .nb-title { color: rgba(0,0,0,0.25); }
  body.light .nb-btn { color: rgba(0,0,0,0.3); }
  body.light .nb-btn:hover { color: #FC5000; }

  body.light .nb-page {
    background: #FAFAFA;
    border-color: rgba(0,0,0,0.06);
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  body.light .nb-page::after {
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.02) 20%, rgba(0,0,0,0.02) 80%, transparent);
  }
  body.light .dot-grid {
    background-image: radial-gradient(circle, rgba(0,0,0,0.08) 0.8px, transparent 0.8px);
  }
  body.light .nb-spine {
    background: linear-gradient(180deg, transparent 0%, rgba(252,80,0,0.15) 15%, rgba(252,80,0,0.15) 85%, transparent 100%);
  }
  body.light .page-num { color: rgba(0,0,0,0.1); }
  body.light .page-nav svg { stroke: rgba(0,0,0,0.12); }
  body.light .page-nav:hover svg { stroke: #FC5000; }

  body.light .tool-btn:hover { background: rgba(0,0,0,0.03); }
  body.light .tool-btn.active { background: rgba(252,80,0,0.06); }
  body.light .tool-btn svg { stroke: rgba(0,0,0,0.25); }
  body.light .tool-btn.active svg { stroke: #FC5000; }
  body.light .tool-btn:hover svg { stroke: rgba(0,0,0,0.45); }
  body.light .tool-sep { background: rgba(0,0,0,0.05); }
  body.light .color-swatch { border-color: rgba(0,0,0,0.08); }
  body.light .color-swatch.active { border-color: #FC5000; }

  body.light .nb-dot { background: rgba(0,0,0,0.08); }
  body.light .nb-dot:hover { background: rgba(0,0,0,0.2); }

  body.light .close-btn { background: rgba(0,0,0,0.04); }
  body.light .close-btn::before,
  body.light .close-btn::after { background: rgba(0,0,0,0.25); }
  body.light .close-btn:hover { background: rgba(252,80,0,0.06); }
  body.light .close-btn:hover::before,
  body.light .close-btn:hover::after { background: #FC5000; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    body { padding: 16px 12px; }
    .nb-header { margin-bottom: 12px; }
    .nb-logo { height: 26px; }
    .nb-title { font-size: 7px; letter-spacing: 2px; }
    .nb-btn { font-size: 7px; }
    .dot-grid {
      background-size: 16px 16px;
      background-position: 12px 12px;
    }
    .tool-btn { width: 28px; height: 28px; }
    .tool-btn svg { width: 12px; height: 12px; }
    .color-swatch { width: 14px; height: 14px; }
    .page-nav { width: 30px; height: 44px; }
    .page-nav svg { width: 16px; height: 16px; }
    .page-num { font-size: 7px; bottom: 8px; right: 10px; }
    .close-btn { width: 32px; height: 32px; top: 12px; right: 12px; }
    .close-btn::before, .close-btn::after { width: 12px; }
  }
</style>
<script>
  if (localStorage.getItem('wp_theme') === 'light') document.body.classList.add('light');
</script>
</head>
<body>

<button class="close-btn" onclick="window.location.href='https://www.wildproject.pro/workspace.html'" title="Zurück"></button>

<!-- ── Header ── -->
<div class="nb-header">
  <a href="https://www.wildproject.pro/workspace.html" class="nb-brand">
    <img src="/wp-logo.png" alt="WP" class="nb-logo">
    <span class="nb-title">Notebook</span>
  </a>
  <div class="nb-controls">
    <button class="nb-btn" id="themeToggle">DARK</button>
  </div>
</div>

<!-- ── Notebook ── -->
<div class="notebook-scene">
  <div class="notebook-book" id="book">
    <div class="nb-spine"></div>
    <!-- Pages rendered by JS -->
  </div>
  <!-- Nav arrows ON the book -->
  <button class="page-nav page-nav-prev" id="prevPage" style="position:absolute;top:50%;left:8px;transform:translateY(-50%);z-index:20;">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="page-nav page-nav-next" id="nextPage" style="position:absolute;top:50%;right:8px;transform:translateY(-50%);z-index:20;">
    <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
  </button>
</div>

<!-- ── Toolbar ── -->
<div class="nb-toolbar">
  <button class="tool-btn active" id="toolPen" title="Stift">
    <svg viewBox="0 0 24 24"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
  </button>
  <button class="tool-btn" id="toolEraser" title="Radierer">
    <svg viewBox="0 0 24 24"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
  </button>

  <div class="tool-sep"></div>

  <button class="tool-btn active" id="strokeThin" title="Dünn">
    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" stroke-width="1"/></svg>
  </button>
  <button class="tool-btn" id="strokeMed" title="Mittel">
    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" stroke-width="2.5"/></svg>
  </button>
  <button class="tool-btn" id="strokeThick" title="Dick">
    <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12" stroke-width="4"/></svg>
  </button>

  <div class="tool-sep"></div>

  <div class="color-swatch active" data-color="default" id="colorDefault" title="Standard" style="background: rgba(255,255,255,0.55);"></div>
  <div class="color-swatch" data-color="orange" id="colorOrange" title="Orange" style="background: #FC5000;"></div>
  <div class="color-swatch" data-color="grey" id="colorGrey" title="Grau" style="background: #555;"></div>

  <div class="tool-sep"></div>

  <button class="tool-btn" id="toolClear" title="Seite löschen">
    <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
  </button>
</div>

<!-- ── Page dots ── -->
<div class="nb-dots" id="pageDots"></div>

<script>
(function() {
  const TOTAL = 8;
  const KEY = 'wp_notebook';
  let current = 0;
  let tool = 'pen';
  let strokeWidth = 1.5;
  let strokeColor = 'default';
  let isDrawing = false;
  let lastX = 0, lastY = 0;

  const book = document.getElementById('book');
  const dotsWrap = document.getElementById('pageDots');

  // ── Build pages ──
  let pages = [];
  let canvases = [];
  let contexts = [];
  let pageData = loadData();

  function loadData() {
    try {
      const d = JSON.parse(localStorage.getItem(KEY));
      if (d && d.length === TOTAL) return d;
    } catch(e) {}
    return Array.from({ length: TOTAL }, () => null);
  }
  function saveData() {
    pageData[current] = canvases[current].toDataURL('image/png');
    localStorage.setItem(KEY, JSON.stringify(pageData));
  }

  for (let i = 0; i < TOTAL; i++) {
    // Page element
    const page = document.createElement('div');
    page.className = 'nb-page';
    page.style.zIndex = TOTAL - i;
    if (i > 0) page.classList.add('behind');

    const grid = document.createElement('div');
    grid.className = 'dot-grid';
    page.appendChild(grid);

    const cvs = document.createElement('canvas');
    cvs.className = 'draw-canvas';
    page.appendChild(cvs);

    const num = document.createElement('div');
    num.className = 'page-num';
    num.textContent = String(i + 1).padStart(2, '0');
    page.appendChild(num);

    book.appendChild(page);
    pages.push(page);
    canvases.push(cvs);
    contexts.push(cvs.getContext('2d'));

    // Dot
    const dot = document.createElement('button');
    dot.className = 'nb-dot' + (i === 0 ? ' active' : '');
    dot.dataset.page = i;
    dotsWrap.appendChild(dot);
  }

  // ── Size all canvases ──
  function sizeCanvases() {
    pages.forEach((p, i) => {
      const rect = p.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      canvases[i].width = rect.width * dpr;
      canvases[i].height = rect.height * dpr;
      canvases[i].style.width = rect.width + 'px';
      canvases[i].style.height = rect.height + 'px';
      contexts[i].scale(dpr, dpr);
      // Restore
      if (pageData[i]) {
        const img = new Image();
        const ctx = contexts[i];
        const w = rect.width, h = rect.height;
        img.onload = () => ctx.drawImage(img, 0, 0, w, h);
        img.src = pageData[i];
      }
    });
  }

  // ── Navigate ──
  function goTo(idx) {
    if (idx < 0 || idx >= TOTAL || idx === current) return;
    // Save current
    saveData();

    const goingForward = idx > current;

    if (goingForward) {
      // Flip pages forward
      for (let i = current; i < idx; i++) {
        pages[i].classList.add('flipped');
        pages[i].classList.remove('behind');
      }
      // Show target
      pages[idx].classList.remove('behind', 'flipped');
      // Hide pages after target
      for (let i = idx + 1; i < TOTAL; i++) {
        pages[i].classList.add('behind');
        pages[i].classList.remove('flipped');
      }
    } else {
      // Unflip pages backward
      for (let i = current; i > idx; i--) {
        pages[i].classList.add('behind');
        pages[i].classList.remove('flipped');
      }
      // Show target
      pages[idx].classList.remove('behind', 'flipped');
      // Pages before target stay flipped
      for (let i = 0; i < idx; i++) {
        pages[i].classList.add('flipped');
        pages[i].classList.remove('behind');
      }
    }

    // z-index management
    pages.forEach((p, i) => {
      if (i < idx) p.style.zIndex = i + 1; // flipped: lower
      else if (i === idx) p.style.zIndex = TOTAL; // current: top
      else p.style.zIndex = TOTAL - i; // behind: stacked
    });

    current = idx;
    updateDots();
  }

  function updateDots() {
    dotsWrap.querySelectorAll('.nb-dot').forEach((d, i) => {
      d.classList.toggle('active', i === current);
    });
  }

  // ── Drawing ──
  function getPos(e) {
    const rect = canvases[current].getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  function getColor() {
    const isLight = document.body.classList.contains('light');
    if (strokeColor === 'orange') return '#FC5000';
    if (strokeColor === 'grey') return isLight ? '#999' : '#555';
    return isLight ? 'rgba(0,0,0,0.65)' : 'rgba(255,255,255,0.55)';
  }
  function startDraw(e) {
    if (e.target.closest('.page-nav')) return;
    e.preventDefault();
    isDrawing = true;
    const pos = getPos(e);
    lastX = pos.x; lastY = pos.y;
  }
  function draw(e) {
    if (!isDrawing) return;
    e.preventDefault();
    const pos = getPos(e);
    const ctx = contexts[current];
    ctx.beginPath();
    ctx.moveTo(lastX, lastY);
    ctx.lineTo(pos.x, pos.y);
    if (tool === 'eraser') {
      ctx.globalCompositeOperation = 'destination-out';
      ctx.strokeStyle = 'rgba(0,0,0,1)';
      ctx.lineWidth = strokeWidth * 8;
    } else {
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = getColor();
      ctx.lineWidth = strokeWidth;
    }
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.stroke();
    lastX = pos.x; lastY = pos.y;
  }
  function endDraw() {
    if (!isDrawing) return;
    isDrawing = false;
    saveData();
  }

  // Bind drawing to each canvas
  canvases.forEach((cvs, i) => {
    cvs.addEventListener('mousedown', startDraw);
    cvs.addEventListener('mousemove', draw);
    cvs.addEventListener('mouseup', endDraw);
    cvs.addEventListener('mouseleave', endDraw);
    cvs.addEventListener('touchstart', startDraw, { passive: false });
    cvs.addEventListener('touchmove', draw, { passive: false });
    cvs.addEventListener('touchend', endDraw);
  });

  // ── Nav ──
  document.getElementById('prevPage').addEventListener('click', () => goTo(current - 1));
  document.getElementById('nextPage').addEventListener('click', () => goTo(current + 1));
  dotsWrap.addEventListener('click', e => {
    const dot = e.target.closest('.nb-dot');
    if (dot) goTo(parseInt(dot.dataset.page));
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') goTo(current + 1);
    if (e.key === 'ArrowLeft') goTo(current - 1);
  });

  // ── Tools ──
  const toolPen = document.getElementById('toolPen');
  const toolEraser = document.getElementById('toolEraser');
  toolPen.addEventListener('click', () => {
    tool = 'pen';
    toolPen.classList.add('active');
    toolEraser.classList.remove('active');
    canvases.forEach(c => c.style.cursor = 'crosshair');
  });
  toolEraser.addEventListener('click', () => {
    tool = 'eraser';
    toolEraser.classList.add('active');
    toolPen.classList.remove('active');
    canvases.forEach(c => c.style.cursor = 'grab');
  });

  const strokeBtns = [
    { el: document.getElementById('strokeThin'), size: 1.5 },
    { el: document.getElementById('strokeMed'), size: 3 },
    { el: document.getElementById('strokeThick'), size: 5 },
  ];
  strokeBtns.forEach(btn => {
    btn.el.addEventListener('click', () => {
      strokeWidth = btn.size;
      strokeBtns.forEach(b => b.el.classList.remove('active'));
      btn.el.classList.add('active');
    });
  });

  document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
      strokeColor = swatch.dataset.color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      swatch.classList.add('active');
    });
  });

  function updateDefaultSwatch() {
    const isLight = document.body.classList.contains('light');
    document.getElementById('colorDefault').style.background = isLight ? 'rgba(0,0,0,0.55)' : 'rgba(255,255,255,0.55)';
  }

  document.getElementById('toolClear').addEventListener('click', () => {
    const rect = canvases[current].parentElement.getBoundingClientRect();
    contexts[current].clearRect(0, 0, rect.width, rect.height);
    pageData[current] = null;
    saveData();
  });

  // ── Theme ──
  const themeBtn = document.getElementById('themeToggle');
  function updateTheme() {
    const isLight = document.body.classList.contains('light');
    themeBtn.textContent = isLight ? 'LIGHT' : 'DARK';
    updateDefaultSwatch();
  }
  themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('light');
    localStorage.setItem('wp_theme', document.body.classList.contains('light') ? 'light' : 'dark');
    updateTheme();
  });

  // ── Init ──
  updateTheme();
  window.addEventListener('resize', () => { saveData(); sizeCanvases(); });
  requestAnimationFrame(() => sizeCanvases());
})();
</script>

</body>
</html>
