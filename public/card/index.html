<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>René Wild — Wild Project</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', -apple-system, sans-serif;
    background: #050505;
    color: #F5F5F3;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Ambient background glow ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(252,80,0,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(252,80,0,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ══════════════════════════════════════ */
  /*  iPHONE 17 PRO FRAME                  */
  /* ══════════════════════════════════════ */
  .iphone-frame {
    position: relative;
    width: 393px;
    height: 852px;
    border-radius: 55px;
    background: #FC5000;
    padding: 4px;
    box-shadow:
      0 0 0 1px rgba(252,80,0,0.6),
      0 0 60px rgba(252,80,0,0.15),
      0 0 120px rgba(252,80,0,0.06),
      0 30px 80px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.2),
      inset 0 -1px 0 rgba(0,0,0,0.3);
    transform: scale(0.82);
    transform-origin: center center;
    opacity: 0;
    animation: phoneEntrance 1s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }
  @keyframes phoneEntrance {
    from { opacity: 0; transform: scale(0.82) translateY(30px); }
    to { opacity: 1; transform: scale(0.82) translateY(0); }
  }

  /* ── Inner chassis (dark edge between frame and screen) ── */
  .iphone-chassis {
    width: 100%;
    height: 100%;
    border-radius: 52px;
    background: #111;
    padding: 3px;
    position: relative;
    overflow: hidden;
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.8),
      inset 0 -1px 1px rgba(255,255,255,0.05);
  }

  /* ── Screen area ── */
  .iphone-screen {
    width: 100%;
    height: 100%;
    border-radius: 49px;
    background: #050505;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  /* ── Dynamic Island ── */
  .dynamic-island {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 37px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04);
  }
  /* Camera lens inside island */
  .dynamic-island::after {
    content: '';
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: radial-gradient(circle, #0a0a1a 30%, #111 50%, #0a0a1a 70%);
    box-shadow:
      0 0 0 1.5px rgba(255,255,255,0.06),
      0 0 3px rgba(252,80,0,0.15);
  }

  /* ── Side buttons (power, volume, action) ── */
  /* Power button — right side */
  .btn-power {
    position: absolute;
    right: -2.5px;
    top: 220px;
    width: 3px;
    height: 72px;
    background: linear-gradient(180deg, #FC5000, #d44400, #FC5000);
    border-radius: 0 2px 2px 0;
    box-shadow: 1px 0 4px rgba(252,80,0,0.3);
  }
  /* Volume up — left side */
  .btn-vol-up {
    position: absolute;
    left: -2.5px;
    top: 185px;
    width: 3px;
    height: 42px;
    background: linear-gradient(180deg, #FC5000, #d44400, #FC5000);
    border-radius: 2px 0 0 2px;
    box-shadow: -1px 0 4px rgba(252,80,0,0.3);
  }
  /* Volume down — left side */
  .btn-vol-down {
    position: absolute;
    left: -2.5px;
    top: 238px;
    width: 3px;
    height: 42px;
    background: linear-gradient(180deg, #FC5000, #d44400, #FC5000);
    border-radius: 2px 0 0 2px;
    box-shadow: -1px 0 4px rgba(252,80,0,0.3);
  }
  /* Action button — left side (smaller) */
  .btn-action {
    position: absolute;
    left: -2.5px;
    top: 140px;
    width: 3px;
    height: 28px;
    background: linear-gradient(180deg, #FC5000, #d44400, #FC5000);
    border-radius: 2px 0 0 2px;
    box-shadow: -1px 0 4px rgba(252,80,0,0.3);
  }

  /* ── Frame highlight reflections ── */
  .iphone-frame::before {
    content: '';
    position: absolute;
    top: 0; left: 20px; right: 20px;
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
    border-radius: 50%;
    z-index: 2;
  }
  .iphone-frame::after {
    content: '';
    position: absolute;
    bottom: 0; left: 30px; right: 30px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    border-radius: 50%;
    z-index: 2;
  }

  /* ── Home indicator bar ── */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    z-index: 10;
  }

  /* ══════════════════════════════════════ */
  /*  SCREEN CONTENT (inside phone)        */
  /* ══════════════════════════════════════ */
  .screen-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 340px;
    margin-top: 10px;
  }

  /* ══════════════════════════════════════ */
  /*  GLASS CARD                           */
  /* ══════════════════════════════════════ */
  .card-container {
    perspective: 800px;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
  }
  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }

  .glass-card {
    width: 310px;
    height: 196px;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    transform-style: preserve-3d;

    /* Glass effect */
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.12) 0%,
      rgba(255,255,255,0.05) 30%,
      rgba(255,255,255,0.02) 50%,
      rgba(255,255,255,0.06) 80%,
      rgba(255,255,255,0.10) 100%
    );
    backdrop-filter: blur(60px) saturate(1.2);
    -webkit-backdrop-filter: blur(60px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow:
      0 8px 40px rgba(0,0,0,0.5),
      0 1px 0 rgba(255,255,255,0.1) inset,
      0 -1px 0 rgba(255,255,255,0.03) inset;
  }

  .glass-card:hover {
    transform: rotateY(-2deg) rotateX(1deg) scale(1.01);
  }

  /* ── Glass reflection / light streak ── */
  .glass-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255,255,255,0.05) 44%,
      rgba(255,255,255,0.12) 50%,
      rgba(255,255,255,0.05) 56%,
      transparent 60%
    );
    pointer-events: none;
    animation: shimmer 6s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { transform: translateX(-20%) translateY(-10%) rotate(0deg); }
    50% { transform: translateX(20%) translateY(10%) rotate(2deg); }
  }

  /* ── Inner edge highlight ── */
  .glass-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.06) 0%,
      transparent 40%,
      transparent 80%,
      rgba(255,255,255,0.02) 100%
    );
    pointer-events: none;
  }

  /* ── Card content ── */
  .card-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Top row: logo + brand */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .card-logo {
    width: 28px;
    height: 28px;
    opacity: 0.85;
  }
  .card-brand {
    font-size: 7px;
    font-weight: 300;
    letter-spacing: 3.5px;
    color: rgba(255,255,255,0.45);
    margin-top: 5px;
  }

  /* Claim under title */
  .card-claim {
    font-size: 5px;
    font-weight: 300;
    letter-spacing: 2.5px;
    color: rgba(255,255,255,0.35);
    margin-top: 7px;
  }
  .card-claim .o { color: #FC5000; }

  /* Bottom area */
  .card-bottom {
    display: flex;
    flex-direction: column;
  }
  .card-name {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.95);
    letter-spacing: 0.5px;
  }
  .card-title {
    font-size: 7px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    margin-top: 3px;
    letter-spacing: 0.3px;
  }

  /* ══════════════════════════════════════ */
  /*  CONTACT INFO (below card)            */
  /* ══════════════════════════════════════ */
  .contact-section {
    width: 310px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    opacity: 0;
    transform: translateY(16px);
    animation: fadeUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
  }

  .contact-row a {
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    font-weight: 300;
    transition: color 0.2s;
    padding: 4px 0;
  }
  .contact-row a:active {
    color: #FC5000;
  }
  .contact-row .icon {
    width: 32px;
    height: 32px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    color: #FC5000;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ── Separator ── */
  .separator {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.06), transparent);
    margin: 2px 0;
  }

  /* ── Save button — glass card style ── */
  .save-container {
    perspective: 800px;
    margin-top: 12px;
  }
  .save-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 14px 20px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.08) 0%,
      rgba(255,255,255,0.03) 40%,
      rgba(255,255,255,0.01) 60%,
      rgba(255,255,255,0.06) 100%
    );
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    box-shadow:
      0 4px 20px rgba(0,0,0,0.3),
      0 1px 0 rgba(255,255,255,0.06) inset;
    font-family: 'Poppins', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.45);
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.3s, color 0.3s;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
  }
  /* ── Shimmer effect like card ── */
  .save-btn::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255,255,255,0.04) 44%,
      rgba(255,255,255,0.08) 50%,
      rgba(255,255,255,0.04) 56%,
      transparent 60%
    );
    pointer-events: none;
    animation: shimmer 6s ease-in-out infinite;
  }
  .save-btn:hover {
    color: rgba(255,255,255,0.65);
    border-color: rgba(252,80,0,0.2);
  }
  .save-btn:active {
    transform: scale(0.97);
  }
  .save-btn svg {
    width: 13px;
    height: 13px;
    fill: #FC5000;
    opacity: 0.5;
  }

  /* ══════════════════════════════════════ */
  /*  MOBILE — no phone frame              */
  /* ══════════════════════════════════════ */
  /* ── Close Button ── */
  .close-btn {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 100;
    width: 36px; height: 36px;
    border: none;
    background: rgba(255,255,255,0.06);
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    opacity: 0;
    animation: fadeUp 0.5s ease 1.2s forwards;
  }
  .close-btn::before,
  .close-btn::after {
    content: '';
    position: absolute;
    width: 14px; height: 1px;
    background: rgba(255,255,255,0.35);
    transition: background 0.3s;
  }
  .close-btn::before { transform: rotate(45deg); }
  .close-btn::after { transform: rotate(-45deg); }
  .close-btn:hover {
    background: rgba(252,80,0,0.1);
  }
  .close-btn:hover::before,
  .close-btn:hover::after {
    background: #FC5000;
  }

  @media (max-width: 500px) {
    body { padding: 24px; overflow: auto; }
    .close-btn { top: 16px; right: 16px; width: 32px; height: 32px; }
    .close-btn::before, .close-btn::after { width: 12px; }

    .iphone-frame {
      all: unset;
      display: contents;
    }
    .iphone-chassis { all: unset; display: contents; }
    .iphone-screen {
      all: unset;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 24px;
    }
    .screen-content {
      max-width: 100%;
    }
    .dynamic-island,
    .home-indicator,
    .btn-power,
    .btn-vol-up,
    .btn-vol-down,
    .btn-action { display: none; }

    .glass-card {
      width: 340px;
      height: 214px;
    }
    .card-inner { padding: 24px 28px; }
    .card-logo { width: 32px; height: 32px; }
    .card-brand { font-size: 8px; letter-spacing: 4px; }
    .card-name { font-size: 15px; }
    .card-title { font-size: 7.5px; }
    .card-claim { font-size: 5.5px; }
    .contact-section { width: 340px; gap: 14px; }
    .contact-row a { font-size: 13px; gap: 14px; padding: 6px 0; }
    .contact-row .icon { width: 36px; height: 36px; font-size: 11px; border-radius: 10px; }
    .save-btn { padding: 16px 20px; font-size: 11px; }

    .card-container { animation-delay: 0.2s; }
    .contact-section { animation-delay: 0.5s; }
  }

  @media (max-width: 380px) {
    .glass-card { width: 100%; height: auto; aspect-ratio: 85.6 / 53.98; }
    .contact-section { width: 100%; }
  }
</style>
</head>
<body>

<!-- ══════ CLOSE BUTTON ══════ -->
<a href="/" class="close-btn" title="Schließen"></a>

<!-- ══════ iPHONE 17 PRO FRAME ══════ -->
<div class="iphone-frame">
  <div class="btn-power"></div>
  <div class="btn-vol-up"></div>
  <div class="btn-vol-down"></div>
  <div class="btn-action"></div>

  <div class="iphone-chassis">
    <div class="iphone-screen">
      <div class="dynamic-island"></div>

      <div class="screen-content">
        <!-- ══════ GLASS CARD ══════ -->
        <div class="card-container">
          <div class="glass-card" id="card">
            <div class="card-inner">
              <div class="card-top">
                <img src="/wp-logo.png" alt="WP" class="card-logo">
                <div class="card-brand"><span style="color: #FC5000;">WILD</span> Project</div>
              </div>
              <div class="card-bottom">
                <div class="card-name">René Wild</div>
                <div class="card-title">Coach · Creator · Podcaster · Ästhetik Junkie</div>
                <div class="card-claim"><span class="o">D</span>ESIGN. <span class="o">P</span>ERFORM. <span class="o">S</span>UCCEED.</div>
              </div>
            </div>
          </div>
        </div>

        <!-- ══════ CONTACT ══════ -->
        <div class="contact-section">
          <div class="contact-row">
            <a href="mailto:rene@wildproject.pro">
              <div class="icon">E</div>
              rene@wildproject.pro
            </a>
          </div>
          <div class="contact-row">
            <a href="https://www.wildproject.pro" target="_blank">
              <div class="icon">W</div>
              wildproject.pro
            </a>
          </div>

          <div class="separator"></div>

          <div class="save-container">
            <button class="save-btn" id="saveBtn" onclick="saveContact()">
              <svg viewBox="0 0 24 24"><path d="M5 20h14v-2H5v2zm7-18L5.33 8.67l1.42 1.42L11 5.83V16h2V5.83l4.25 4.26 1.42-1.42L12 2z" transform="rotate(180 12 12)"/></svg>
              Connect
            </button>
          </div>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</div>

<script>
// ── 3D tilt on mouse/touch ──
const card = document.getElementById('card');
card.addEventListener('mousemove', (e) => {
  const rect = card.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;
  card.style.transform = `rotateY(${x * 8}deg) rotateX(${-y * 8}deg) scale(1.02)`;
});
card.addEventListener('mouseleave', () => {
  card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
});

let touching = false;
card.addEventListener('touchmove', (e) => {
  e.preventDefault();
  touching = true;
  const touch = e.touches[0];
  const rect = card.getBoundingClientRect();
  const x = (touch.clientX - rect.left) / rect.width - 0.5;
  const y = (touch.clientY - rect.top) / rect.height - 0.5;
  card.style.transform = `rotateY(${x * 12}deg) rotateX(${-y * 12}deg) scale(1.02)`;
}, { passive: false });
card.addEventListener('touchend', () => {
  touching = false;
  card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
});

// ── 3D tilt on save button ──
const saveBtn = document.getElementById('saveBtn');
saveBtn.addEventListener('mousemove', (e) => {
  const rect = saveBtn.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;
  saveBtn.style.transform = `rotateY(${x * 6}deg) rotateX(${-y * 6}deg) scale(1.01)`;
});
saveBtn.addEventListener('mouseleave', () => {
  saveBtn.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
});
saveBtn.addEventListener('touchmove', (e) => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = saveBtn.getBoundingClientRect();
  const x = (touch.clientX - rect.left) / rect.width - 0.5;
  const y = (touch.clientY - rect.top) / rect.height - 0.5;
  saveBtn.style.transform = `rotateY(${x * 10}deg) rotateX(${-y * 10}deg) scale(1.01)`;
}, { passive: false });
saveBtn.addEventListener('touchend', () => {
  saveBtn.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
});

// ── vCard download ──
function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Wild;René;;;',
    'FN:René Wild',
    'ORG:Wild Project',
    'TITLE:Coach & Creator',
    'EMAIL:rene@wildproject.pro',
    'URL:https://www.wildproject.pro',
    'ADR;TYPE=WORK:;;Mitterweg 41;Rosenheim;;83024;Germany',
    'NOTE:DESIGN. PERFORM. SUCCEED.',
    'END:VCARD'
  ].join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Rene-Wild.vcf';
  a.click();
  URL.revokeObjectURL(url);
}
</script>

</body>
</html>
