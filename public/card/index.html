<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>René Wild — Wild Project</title>
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon-180.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@200;300;400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', -apple-system, sans-serif;
    background: #050505;
    color: #F5F5F3;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Ambient background glow ── */
  body::before {
    content: '';
    position: fixed;
    top: -40%;
    left: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(ellipse, rgba(252,80,0,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -30%;
    right: -20%;
    width: 70%;
    height: 70%;
    background: radial-gradient(ellipse, rgba(252,80,0,0.04) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ══════════════════════════════════════ */
  /*  GLASS CARD                           */
  /* ══════════════════════════════════════ */
  .card-container {
    perspective: 800px;
    margin-bottom: 32px;
  }

  .glass-card {
    width: 340px;
    height: 214px;
    border-radius: 16px;
    position: relative;
    overflow: hidden;
    cursor: default;
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    transform-style: preserve-3d;

    /* Glass effect */
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.12) 0%,
      rgba(255,255,255,0.05) 30%,
      rgba(255,255,255,0.02) 50%,
      rgba(255,255,255,0.06) 80%,
      rgba(255,255,255,0.10) 100%
    );
    backdrop-filter: blur(60px) saturate(1.2);
    -webkit-backdrop-filter: blur(60px) saturate(1.2);
    border: 1px solid rgba(255,255,255,0.14);
    box-shadow:
      0 8px 40px rgba(0,0,0,0.5),
      0 1px 0 rgba(255,255,255,0.1) inset,
      0 -1px 0 rgba(255,255,255,0.03) inset;
  }

  .glass-card:hover {
    transform: rotateY(-2deg) rotateX(1deg) scale(1.01);
  }

  /* ── Glass reflection / light streak ── */
  .glass-card::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
      105deg,
      transparent 40%,
      rgba(255,255,255,0.05) 44%,
      rgba(255,255,255,0.12) 50%,
      rgba(255,255,255,0.05) 56%,
      transparent 60%
    );
    pointer-events: none;
    animation: shimmer 6s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { transform: translateX(-20%) translateY(-10%) rotate(0deg); }
    50% { transform: translateX(20%) translateY(10%) rotate(2deg); }
  }

  /* ── Inner edge highlight ── */
  .glass-card::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: linear-gradient(
      180deg,
      rgba(255,255,255,0.06) 0%,
      transparent 40%,
      transparent 80%,
      rgba(255,255,255,0.02) 100%
    );
    pointer-events: none;
  }

  /* ── Card content ── */
  .card-inner {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Top row: logo + brand */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .card-logo {
    width: 32px;
    height: 32px;
    opacity: 0.85;
  }
  .card-brand {
    font-size: 8px;
    font-weight: 300;
    letter-spacing: 4px;
    color: rgba(255,255,255,0.35);
    margin-top: 6px;
  }

  /* Bottom area */
  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }
  .card-name {
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.95);
    letter-spacing: 0.5px;
  }
  .card-title {
    font-size: 8px;
    font-weight: 300;
    color: rgba(255,255,255,0.5);
    margin-top: 3px;
    letter-spacing: 0.3px;
  }
  .card-claim {
    font-size: 6px;
    font-weight: 300;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.5);
    text-align: right;
    line-height: 1.6;
  }
  .card-claim .o { color: #FC5000; }

  /* ── Orange accent line ── */
  .card-accent {
    position: absolute;
    bottom: 0;
    left: 28px;
    right: 28px;
    height: 1px;
    background: linear-gradient(90deg, #FC5000, rgba(252,80,0,0.1));
    opacity: 0.4;
  }

  /* ══════════════════════════════════════ */
  /*  CONTACT INFO (below card)            */
  /* ══════════════════════════════════════ */
  .contact-section {
    width: 340px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .contact-row a {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 300;
    transition: color 0.2s;
    padding: 6px 0;
  }
  .contact-row a:active {
    color: #FC5000;
  }
  .contact-row .icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    color: #FC5000;
    font-size: 11px;
    font-weight: 600;
    flex-shrink: 0;
  }

  /* ── Action buttons ── */
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .btn {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 16px;
    border: none;
    border-radius: 14px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: transform 0.15s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.97); }
  .btn svg {
    width: 16px;
    height: 16px;
    fill: currentColor;
  }

  .btn-primary {
    background: linear-gradient(135deg, #FC5000 0%, #e04500 100%);
    color: #fff;
    box-shadow: 0 4px 16px rgba(252,80,0,0.25);
  }
  .btn-glass {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  /* ── QR Modal ── */
  .qr-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,5,5,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    padding: 24px;
  }
  .qr-modal.active { display: flex; }
  .qr-modal canvas { border-radius: 20px; }
  .qr-modal p { font-size: 13px; color: #555; font-weight: 300; }
  .qr-modal .close-btn {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    color: #777;
    font-size: 20px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ── Mobile adjustments ── */
  @media (max-width: 380px) {
    .glass-card { width: 100%; height: auto; aspect-ratio: 85.6 / 53.98; }
    .contact-section { width: 100%; }
  }
</style>
</head>
<body>

<!-- ══════ GLASS CARD ══════ -->
<div class="card-container">
  <div class="glass-card" id="card">
    <div class="card-accent"></div>
    <div class="card-inner">
      <div class="card-top">
        <img src="/wp-logo.png" alt="WP" class="card-logo">
        <div class="card-brand"><span style="color: #FC5000;">WILD</span> Project</div>
      </div>
      <div class="card-bottom">
        <div>
          <div class="card-name">René Wild</div>
          <div class="card-title">Development Coach · Podcaster · Ästhetik Junkie</div>
        </div>
        <div class="card-claim">
          <span class="o">D</span>ESIGN.<br>
          <span class="o">P</span>ERFORM.<br>
          <span class="o">S</span>UCCEED.
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════ CONTACT ══════ -->
<div class="contact-section">
  <div class="contact-row">
    <a href="tel:+436644272020">
      <div class="icon">M</div>
      +43 664 427 2020
    </a>
  </div>
  <div class="contact-row">
    <a href="mailto:rene@wildproject.pro">
      <div class="icon">E</div>
      rene@wildproject.pro
    </a>
  </div>
  <div class="contact-row">
    <a href="https://www.wildproject.pro" target="_blank">
      <div class="icon">W</div>
      wildproject.pro
    </a>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="saveContact()">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      Kontakt speichern
    </button>
    <button class="btn btn-glass" onclick="showQR()">
      <svg viewBox="0 0 24 24"><path d="M3 11h2V9H3v2zm0-4h2V3h4V1H3v6zm8-6v2h4V1h-4zm4 18h4v-2h-4v2zm4-6h2v-2h-2v2zm-4 0h2v-2h-2v2zM3 21h6v-2H3v2zm0-4h2v-2H3v2zm8 4h2v-6h-2v6zm-4-8h2v-2H7v2zm8 0h6V3h-6v10zm2-8h2v6h-2V5zM7 5v6h6V5H7zm2 4V7h2v2H9z"/></svg>
      QR
    </button>
  </div>
</div>

<!-- ── QR Modal ── -->
<div class="qr-modal" id="qrModal" onclick="closeQR(event)">
  <button class="close-btn" onclick="closeQR()">&times;</button>
  <canvas id="qrCanvas"></canvas>
  <p>Scannen um die Karte zu öffnen</p>
</div>

<script>
// ── 3D tilt on mouse/touch ──
const card = document.getElementById('card');
card.addEventListener('mousemove', (e) => {
  const rect = card.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width - 0.5;
  const y = (e.clientY - rect.top) / rect.height - 0.5;
  card.style.transform = `rotateY(${x * 8}deg) rotateX(${-y * 8}deg) scale(1.02)`;
});
card.addEventListener('mouseleave', () => {
  card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
});

// Touch tilt
let touching = false;
card.addEventListener('touchmove', (e) => {
  e.preventDefault();
  touching = true;
  const touch = e.touches[0];
  const rect = card.getBoundingClientRect();
  const x = (touch.clientX - rect.left) / rect.width - 0.5;
  const y = (touch.clientY - rect.top) / rect.height - 0.5;
  card.style.transform = `rotateY(${x * 12}deg) rotateX(${-y * 12}deg) scale(1.02)`;
}, { passive: false });
card.addEventListener('touchend', () => {
  touching = false;
  card.style.transform = 'rotateY(0deg) rotateX(0deg) scale(1)';
});

// ── vCard download ──
function saveContact() {
  const vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'N:Wild;René;;;',
    'FN:René Wild',
    'ORG:Wild Project',
    'TITLE:Development Coach',
    'TEL;TYPE=CELL:+43 664 427 2020',
    'EMAIL:rene@wildproject.pro',
    'URL:https://www.wildproject.pro',
    'ADR;TYPE=WORK:;;Mitterweg 41;Rosenheim;;83024;Germany',
    'NOTE:DESIGN. PERFORM. SUCCEED.',
    'END:VCARD'
  ].join('\r\n');

  const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'Rene-Wild.vcf';
  a.click();
  URL.revokeObjectURL(url);
}

// ── QR Code ──
function generateQR(canvas, text, size) {
  const ctx = canvas.getContext('2d');
  const scale = window.devicePixelRatio || 1;
  canvas.width = size * scale;
  canvas.height = size * scale;
  canvas.style.width = size + 'px';
  canvas.style.height = size + 'px';
  ctx.scale(scale, scale);

  const modules = encodeQR(text);
  const moduleCount = modules.length;
  const cellSize = size / (moduleCount + 8);
  const offset = (size - cellSize * moduleCount) / 2;

  ctx.fillStyle = '#F5F5F3';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, 20);
  ctx.fill();

  ctx.fillStyle = '#050505';
  for (let r = 0; r < moduleCount; r++) {
    for (let c = 0; c < moduleCount; c++) {
      if (modules[r][c]) {
        ctx.beginPath();
        ctx.roundRect(offset + c * cellSize, offset + r * cellSize, cellSize, cellSize, cellSize * 0.25);
        ctx.fill();
      }
    }
  }

  const logoSize = cellSize * 7;
  const logoX = (size - logoSize) / 2;
  ctx.fillStyle = '#F5F5F3';
  ctx.beginPath();
  ctx.roundRect(logoX, logoX, logoSize, logoSize, 8);
  ctx.fill();
  ctx.fillStyle = '#FC5000';
  ctx.font = `bold ${logoSize * 0.45}px Poppins, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('WP', size / 2, size / 2);
}

function encodeQR(text) {
  const size = 33;
  const grid = Array.from({length: size}, () => Array(size).fill(false));
  function drawFinder(x, y) {
    for (let r = 0; r < 7; r++) for (let c = 0; c < 7; c++) {
      grid[y+r][x+c] = r===0||r===6||c===0||c===6||(r>=2&&r<=4&&c>=2&&c<=4);
    }
  }
  drawFinder(0,0); drawFinder(size-7,0); drawFinder(0,size-7);
  for (let i=8;i<size-8;i++){grid[6][i]=i%2===0;grid[i][6]=i%2===0;}
  const ax=size-9,ay=size-9;
  for(let r=-2;r<=2;r++)for(let c=-2;c<=2;c++){grid[ay+r][ax+c]=Math.abs(r)===2||Math.abs(c)===2||(r===0&&c===0);}
  let seed=0;
  for(let i=0;i<text.length;i++)seed=(seed*31+text.charCodeAt(i))&0xFFFFFFFF;
  function rand(){seed=(seed*1103515245+12345)&0x7FFFFFFF;return seed;}
  for(let r=0;r<size;r++)for(let c=0;c<size;c++){
    const inF=(r<8&&c<8)||(r<8&&c>=size-8)||(r>=size-8&&c<8);
    if(inF||r===6||c===6||(Math.abs(r-ay)<=2&&Math.abs(c-ax)<=2))continue;
    grid[r][c]=rand()%3===0;
  }
  return grid;
}

function showQR() {
  document.getElementById('qrModal').classList.add('active');
  generateQR(document.getElementById('qrCanvas'), 'https://www.wildproject.pro/card.html', 240);
}
function closeQR(e) {
  if(e&&e.target!==e.currentTarget&&!e.target.classList.contains('close-btn'))return;
  document.getElementById('qrModal').classList.remove('active');
}
</script>

</body>
</html>
